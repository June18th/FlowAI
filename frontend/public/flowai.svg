<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- 智枢 KnowHub · 枢 · 中心交汇 -->
  <defs>
    <!-- x lines gradient: purple → indigo -->
    <linearGradient id="x1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="x2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- y lines gradient: cyan → blue -->
    <linearGradient id="y1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="y2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="white" flood-opacity="0.3"/></filter>
  </defs>

  <rect width="400" height="400" fill="#162032" rx="80"/>

  <!-- Hub rings -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(99,102,241,0.04)" stroke-width="0.6" stroke-dasharray="3,14"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="rgba(6,182,212,0.05)" stroke-width="0.6" stroke-dasharray="2,10"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="rgba(148,163,184,0.06)" stroke-width="0.8" stroke-dasharray="2,9"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="1" stroke-dasharray="3,10"/>

  <!-- Radiating spokes -->
  <g stroke="rgba(148,163,184,0.05)" stroke-width="0.5">
    <line x1="200" y1="200" x2="200" y2="60"/>
    <line x1="200" y1="200" x2="299" y2="101"/>
    <line x1="200" y1="200" x2="340" y2="200"/>
    <line x1="200" y1="200" x2="299" y2="299"/>
    <line x1="200" y1="200" x2="200" y2="340"/>
    <line x1="200" y1="200" x2="101" y2="299"/>
    <line x1="200" y1="200" x2="60" y2="200"/>
    <line x1="200" y1="200" x2="101" y2="101"/>
  </g>

  <!-- X: two thick crossing lines -->
  <line x1="88" y1="88" x2="312" y2="312" stroke="url(#x1)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="88" y1="88" x2="312" y2="312" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.12"/>
  <line x1="312" y1="88" x2="88" y2="312" stroke="url(#x2)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="312" y1="88" x2="88" y2="312" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.12"/>

  <!-- Y: vertical stem + fork -->
  <line x1="200" y1="200" x2="200" y2="100" stroke="url(#y1)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="200" y1="200" x2="200" y2="280" stroke="url(#y1)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <line x1="200" y1="260" x2="148" y2="324" stroke="url(#y2)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <line x1="200" y1="260" x2="248" y2="324" stroke="url(#y2)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <line x1="200" y1="104" x2="200" y2="276" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.15"/>

  <!-- Center Hub node -->
  <circle cx="200" cy="200" r="46" fill="url(#hub)" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="28" fill="#162032" stroke="white" stroke-width="2" opacity="0.9"/>
  <circle cx="200" cy="200" r="22" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <circle cx="200" cy="200" r="8" fill="white" opacity="0.85" filter="url(#glow2)"/>
  <circle cx="200" cy="200" r="3" fill="white" filter="url(#shadow)"/>
</svg>
